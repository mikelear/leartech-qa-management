# Gate quills configuration.
# Consumed by leartech-gate; declares which quills run + how.
# Single quill in the spike; Phase 1 adds contract-tests + co-promotion;
# Phase 2 adds load-sla; Phase 2.5 adds risk-override; Phase 2.7 adds
# post-deploy-tests.

schema_version: v1

quills:
  shift-left-tests:
    blocking: true
    description: "Required Playwright + contract tests passed for the promoted SHA"
    impl: result-store-lookup
    config:
      result_store: gs://test-artifacts-product-first/results/v1/
      tolerate_missing_window: false   # spike: missing results = fail
