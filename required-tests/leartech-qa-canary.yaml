# required-tests for leartech-qa-canary
# Consumed by leartech-gate's shift-left-tests quill at promotion time.
# A promotion PR for leartech-qa-canary fires the gate; the gate reads
# this file to know which test results MUST be `Success` in the result-store
# (gs://test-artifacts-product-first/results/v1/leartech-qa-canary/<sha>/<cluster>/...)
# before allowing the PR check to pass.
#
# Phase 1 hardening will add: CUE schema validation, blocking/quarantined
# flags per test, flake_budget, suite metadata, owner. Spike has minimum.

schema_version: v1
service: leartech-qa-canary
type: go-service                 # cross-ref to (future) repo-type-policy

# Empty required_tests intentionally — the canary's smoke suite is
# now exercised by the post-deploy quill (leartech-arrivals-observer
# dispatches an end2end Job against the staging arrival; the gate
# reads Arrival.phase=Passed). Double-gating on shift-left here
# duplicates the same smoke test under different path math (shift-left
# uses {service}/{version}-keyed GCS paths from PR-time builds; post-
# deploy uses {cluster}/{namespace}/{service}/{version}/{pack}-keyed
# paths from arrivals-observer). The post-deploy verdict is the load-
# bearing one for production releases.
#
# Reinstate when there's a NEW pre-merge test that has no post-deploy
# equivalent (e.g. a contract test against a stub backend that only
# runs at PR-time).
required_tests: []
