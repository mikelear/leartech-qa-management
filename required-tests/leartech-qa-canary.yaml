# required-tests for leartech-qa-canary
# Consumed by leartech-gate's shift-left-tests quill at promotion time.
# A promotion PR for leartech-qa-canary fires the gate; the gate reads
# this file to know which test results MUST be `Success` in the result-store
# (gs://test-artifacts-product-first/results/v1/leartech-qa-canary/<sha>/<cluster>/...)
# before allowing the PR check to pass.
#
# Phase 1 hardening will add: CUE schema validation, blocking/quarantined
# flags per test, flake_budget, suite metadata, owner. Spike has minimum.

schema_version: v1
service: leartech-qa-canary
type: go-service                 # cross-ref to (future) repo-type-policy

# 2026-05-14 — temporarily populated for the shift-left quill validation
# cycle. canary is the org's test bed; the entry below references a stub
# test produced by the leartech-qa-canary release.yaml's shift-left-stub
# task. See qa-architecture/test-pack-shift-left.md for the 6-branch plan.
#
# This is NOT the long-term shape — once the validation cycle is done +
# the data-driven quill refactor is decided, revisit whether canary should
# carry real shift-left tests or revert to empty (post-deploy is the
# load-bearing gate for production releases either way).
required_tests:
  - name: canary-healthy
    test_pack: smoke
    blocking: true
    suite: shift-left-validation
